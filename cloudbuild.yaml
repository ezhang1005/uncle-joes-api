steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/uncle-joes-repo/uncle-joes-api:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/uncle-joes-repo/uncle-joes-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - uncle-joes-api
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/uncle-joes-repo/uncle-joes-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/uncle-joes-repo/uncle-joes-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
